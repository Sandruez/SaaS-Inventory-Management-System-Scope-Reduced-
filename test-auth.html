<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Test - StockFlow</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {}
            }
        }
    </script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">🔐 Authentication Test</h1>
        
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4">Test Signup</h2>
            <form id="signupForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Organization Name</label>
                    <input type="text" id="testOrgName" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md" value="Test Organization">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="testEmail" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md" value="test@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="testPassword" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md" value="password123">
                </div>
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                    Test Signup
                </button>
            </form>
            <div id="signupResult" class="mt-4 p-4 bg-gray-100 rounded"></div>
        </div>

        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4">Test Login</h2>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="testLoginEmail" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md" value="test@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="testLoginPassword" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md" value="password123">
                </div>
                <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                    Test Login
                </button>
            </form>
            <div id="loginResult" class="mt-4 p-4 bg-gray-100 rounded"></div>
        </div>

        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4">Test Protected API</h2>
            <button onclick="testDashboard()" class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">
                Test Dashboard API
            </button>
            <div id="dashboardResult" class="mt-4 p-4 bg-gray-100 rounded"></div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-4">Current Auth Status</h2>
            <div id="authStatus" class="text-sm text-gray-600">
                No authentication data
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let authToken = null;
        let currentUser = null;

        // Load auth from localStorage
        function loadAuth() {
            authToken = localStorage.getItem('authToken');
            const userStr = localStorage.getItem('currentUser');
            currentUser = userStr ? JSON.parse(userStr) : null;
            updateAuthStatus();
        }

        // Update auth status display
        function updateAuthStatus() {
            const statusDiv = document.getElementById('authStatus');
            if (authToken && currentUser) {
                statusDiv.innerHTML = `
                    <div class="text-green-600">
                        <p><strong>✅ Authenticated</strong></p>
                        <p>User: ${currentUser.name} (${currentUser.email})</p>
                        <p>Organization: ${currentUser.organization.name}</p>
                        <p>Token: ${authToken.substring(0, 20)}...</p>
                    </div>
                `;
            } else {
                statusDiv.innerHTML = `
                    <div class="text-red-600">
                        <p><strong>❌ Not Authenticated</strong></p>
                        <p>Please signup or login to test authenticated features</p>
                    </div>
                `;
            }
        }

        // Test signup
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('signupResult');
            
            try {
                const response = await axios.post(`${API_BASE}/api/auth/signup`, {
                    orgName: document.getElementById('testOrgName').value,
                    email: document.getElementById('testEmail').value,
                    password: document.getElementById('testPassword').value
                });
                
                authToken = response.data.token;
                currentUser = response.data.user;
                
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                resultDiv.innerHTML = `
                    <div class="text-green-600">
                        <h3 class="font-bold">✅ Signup Successful!</h3>
                        <p>${response.data.message}</p>
                        <p>User: ${currentUser.name}</p>
                        <p>Organization: ${currentUser.organization.name}</p>
                    </div>
                `;
                
                updateAuthStatus();
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-600">
                        <h3 class="font-bold">❌ Signup Failed</h3>
                        <p>${error.response?.data?.error || error.message}</p>
                    </div>
                `;
            }
        });

        // Test login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('loginResult');
            
            try {
                const response = await axios.post(`${API_BASE}/api/auth/login`, {
                    email: document.getElementById('testLoginEmail').value,
                    password: document.getElementById('testLoginPassword').value
                });
                
                authToken = response.data.token;
                currentUser = response.data.user;
                
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                resultDiv.innerHTML = `
                    <div class="text-green-600">
                        <h3 class="font-bold">✅ Login Successful!</h3>
                        <p>${response.data.message}</p>
                        <p>User: ${currentUser.name}</p>
                        <p>Organization: ${currentUser.organization.name}</p>
                    </div>
                `;
                
                updateAuthStatus();
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-600">
                        <h3 class="font-bold">❌ Login Failed</h3>
                        <p>${error.response?.data?.error || error.message}</p>
                    </div>
                `;
            }
        });

        // Test dashboard API
        async function testDashboard() {
            const resultDiv = document.getElementById('dashboardResult');
            
            if (!authToken) {
                resultDiv.innerHTML = `
                    <div class="text-red-600">
                        <p>Please login first to test protected endpoints</p>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await axios.get(`${API_BASE}/api/dashboard`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                resultDiv.innerHTML = `
                    <div class="text-green-600">
                        <h3 class="font-bold">✅ Dashboard API Working!</h3>
                        <p>Total Products: ${response.data.summary.totalProducts}</p>
                        <p>Low Stock Items: ${response.data.summary.lowStockItems}</p>
                        <p>Total Quantity: ${response.data.summary.totalQuantity}</p>
                    </div>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-600">
                        <h3 class="font-bold">❌ Dashboard API Failed</h3>
                        <p>${error.response?.data?.error || error.message}</p>
                    </div>
                `;
            }
        }

        // Initialize on page load
        window.onload = function() {
            loadAuth();
        };
    </script>
</body>
</html>
